<svg width="680" height="420" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
<title>SmartAPI versus a hand-rolled stack on top of an HTTP client</title>
<desc>On the left, a hand-rolled stack: Codable models, a retry policy, auth refresh, a cache layer, a pagination state machine, and observability wiring — all on top of an HTTP client like Alamofire, and all written and maintained by you. On the right, a single SmartAPI macro generates the same typed models, retry, auth, cache, pagination, and observability on top of URLSession.</desc>
<rect x="0" y="0" width="680" height="420" rx="12" fill="#ffffff"/>

<rect x="40" y="14" width="13" height="13" rx="3" fill="#FAEEDA" stroke="#BA7517"/>
<text x="58" y="25" font-size="12" fill="#5F5E5A">you write &amp; maintain</text>
<rect x="240" y="14" width="13" height="13" rx="3" fill="#E1F5EE" stroke="#1D9E75"/>
<text x="258" y="25" font-size="12" fill="#5F5E5A">generated by SmartAPI</text>

<text x="185" y="56" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">hand-rolled with an HTTP client</text>
<text x="505" y="56" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">with SmartAPI</text>

<rect x="40" y="72" width="290" height="36" rx="7" fill="#FAEEDA" stroke="#BA7517"/>
<text x="58" y="95" font-size="13" font-weight="500" fill="#854F0B">Codable models + CodingKeys</text>
<rect x="40" y="116" width="290" height="36" rx="7" fill="#FAEEDA" stroke="#BA7517"/>
<text x="58" y="139" font-size="13" font-weight="500" fill="#854F0B">retry policy / interceptor</text>
<rect x="40" y="160" width="290" height="36" rx="7" fill="#FAEEDA" stroke="#BA7517"/>
<text x="58" y="183" font-size="13" font-weight="500" fill="#854F0B">auth refresh + 401 retry</text>
<rect x="40" y="204" width="290" height="36" rx="7" fill="#FAEEDA" stroke="#BA7517"/>
<text x="58" y="227" font-size="13" font-weight="500" fill="#854F0B">cache layer</text>
<rect x="40" y="248" width="290" height="36" rx="7" fill="#FAEEDA" stroke="#BA7517"/>
<text x="58" y="271" font-size="13" font-weight="500" fill="#854F0B">pagination state machine</text>
<rect x="40" y="292" width="290" height="36" rx="7" fill="#FAEEDA" stroke="#BA7517"/>
<text x="58" y="315" font-size="13" font-weight="500" fill="#854F0B">observability wiring</text>
<rect x="40" y="340" width="290" height="38" rx="7" fill="#F1EFE8" stroke="#888780"/>
<text x="185" y="364" text-anchor="middle" font-size="13" fill="#5F5E5A">HTTP client · Alamofire / URLSession</text>

<text x="345" y="205" text-anchor="middle" font-size="14" font-weight="500" fill="#888780">vs</text>

<rect x="360" y="72" width="290" height="256" rx="8" fill="#E1F5EE" stroke="#1D9E75"/>
<text x="378" y="102" font-size="13" font-weight="500" fill="#085041" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">@SmartAPI(...) enum Users {}</text>
<text x="378" y="138" font-size="13" fill="#0F6E56">✓ typed Codable models</text>
<text x="378" y="164" font-size="13" fill="#0F6E56">✓ retry — safe by default</text>
<text x="378" y="190" font-size="13" fill="#0F6E56">✓ auth refresh + dedup</text>
<text x="378" y="216" font-size="13" fill="#0F6E56">✓ offline cache</text>
<text x="378" y="242" font-size="13" fill="#0F6E56">✓ pagination + infinite scroll</text>
<text x="378" y="268" font-size="13" fill="#0F6E56">✓ observability</text>
<rect x="360" y="340" width="290" height="38" rx="7" fill="#F1EFE8" stroke="#888780"/>
<text x="505" y="364" text-anchor="middle" font-size="13" fill="#5F5E5A">URLSession · built in</text>

<text x="185" y="402" text-anchor="middle" font-size="12" fill="#854F0B">≈ 40 lines, yours to maintain</text>
<text x="505" y="402" text-anchor="middle" font-size="12" fill="#0F6E56">1 macro call</text>
</svg>
