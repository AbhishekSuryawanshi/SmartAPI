<svg width="680" height="452" viewBox="0 0 680 452" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
<title>SmartAPI quickstart: the four things you do, and the screen you get for free</title>
<desc>Step one: add the package. Step two: paste your API's JSON sample. Step three: create a loader and call load. Step four: bind it to a SwiftUI view. The result is a typed, networked, cached screen with no Codable, CodingKeys, or URLSession written by hand.</desc>
<defs>
<marker id="aP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-rev">
<path d="M0,0 L10,5 L0,10" fill="none" stroke="#534AB7" stroke-width="1.5"/>
</marker>
</defs>
<rect x="0" y="0" width="680" height="452" rx="12" fill="#ffffff"/>

<rect x="100" y="10" width="13" height="13" rx="3" fill="#EEEDFE" stroke="#7F77DD"/>
<text x="120" y="21" font-size="12" fill="#5F5E5A">the 4 things you do</text>
<rect x="300" y="10" width="13" height="13" rx="3" fill="#EAF3DE" stroke="#97C459"/>
<text x="320" y="21" font-size="12" fill="#5F5E5A">what you get, free</text>

<line x1="70" y1="73" x2="70" y2="307" stroke="#534AB7" stroke-width="2"/>

<circle cx="70" cy="73" r="15" fill="#534AB7"/>
<text x="70" y="78" text-anchor="middle" font-size="14" font-weight="500" fill="#ffffff">1</text>
<rect x="100" y="44" width="520" height="58" rx="8" fill="#EEEDFE" stroke="#7F77DD"/>
<text x="120" y="70" font-size="14" font-weight="500" fill="#3C3489">add the package</text>
<text x="120" y="89" font-size="12" fill="#534AB7" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">github.com/AbhishekSuryawanshi/SmartAPI</text>

<circle cx="70" cy="151" r="15" fill="#534AB7"/>
<text x="70" y="156" text-anchor="middle" font-size="14" font-weight="500" fill="#ffffff">2</text>
<rect x="100" y="122" width="520" height="58" rx="8" fill="#EEEDFE" stroke="#7F77DD"/>
<text x="120" y="148" font-size="14" font-weight="500" fill="#3C3489">paste your API's JSON sample</text>
<text x="120" y="167" font-size="12" fill="#534AB7" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">@SmartAPI(sample: "{ ... }") enum User {}</text>

<circle cx="70" cy="229" r="15" fill="#534AB7"/>
<text x="70" y="234" text-anchor="middle" font-size="14" font-weight="500" fill="#ffffff">3</text>
<rect x="100" y="200" width="520" height="58" rx="8" fill="#EEEDFE" stroke="#7F77DD"/>
<text x="120" y="226" font-size="14" font-weight="500" fill="#3C3489">create a loader, call load()</text>
<text x="120" y="245" font-size="12" fill="#534AB7" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">await User.Loader(url: ...).load()</text>

<circle cx="70" cy="307" r="15" fill="#534AB7"/>
<text x="70" y="312" text-anchor="middle" font-size="14" font-weight="500" fill="#ffffff">4</text>
<rect x="100" y="278" width="520" height="58" rx="8" fill="#EEEDFE" stroke="#7F77DD"/>
<text x="120" y="304" font-size="14" font-weight="500" fill="#3C3489">bind it to a SwiftUI view</text>
<text x="120" y="323" font-size="12" fill="#534AB7" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">SmartView(loader:) { user in ... }</text>

<line x1="360" y1="336" x2="360" y2="366" stroke="#534AB7" stroke-width="1.5" marker-end="url(#aP)"/>

<rect x="100" y="366" width="520" height="66" rx="8" fill="#EAF3DE" stroke="#97C459"/>
<text x="120" y="396" font-size="14" font-weight="500" fill="#27500A">a typed, networked, cached screen</text>
<text x="120" y="416" font-size="12" fill="#3B6D11">no Codable, no CodingKeys, no URLSession to write</text>
</svg>
